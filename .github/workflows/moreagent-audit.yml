# MoreAgent Code Quality Audit — 自动代码质量门禁
# 由项目三 (https://github.com/qjx181/more_agent) 驱动
# 每次 push 和 PR 自动运行深度扫描

name: MoreAgent Code Quality Audit

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  audit:
    name: Code Quality Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run MoreAgent Quality Scan
        run: |
          # 如果项目三在同一仓库，用相对路径；否则需要单独检出
          P3_DIR="${{ github.workspace }}/../project3"
          if [ -d "$P3_DIR" ]; then
            python3 "$P3_DIR/moreagent.py" scan "${{ github.workspace }}"
          else
            echo "项目三未检出，请先配置 P3_DIR 路径"
            echo "或手动运行: python3 /path/to/project3/moreagent.py scan ${{ github.workspace }}"
          fi

      - name: Upload Scan Report
        uses: actions/upload-artifact@v4
        with:
          name: moreagent-scan-report
          path: docs/p3_scan_*.md
          retention-days: 30
