[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["src"]
omit = [
    "src/infra/*",
    "tests/*",
    "scripts/*",
    "*/__pycache__/*",
]

[tool.coverage.report]
# 起步门禁：初始测试覆盖 3 个核心模块。随测试扩展逐步提高到 40% → 60%
fail_under = 15
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "pass",
]

[tool.coverage.html]
directory = "htmlcov"
